# 1. 양쪽 OLED 디스플레이 활성화
CONFIG_ZMK_DISPLAY=y

# 2. Per-Key RGB 백라이트 하드웨어 모듈 활성화
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# 3. 배터리 절약을 위한 자동 취침 모드 (5분간 입력 없으면 슬립)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# 4. 부팅 시 RGB 백라이트의 기본 상태를 '꺼짐'으로 고정 (단축키로 On/Off)
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
