# =============================================================
# 1. 디스플레이 활성화 및 확장 정보 표기 (최신 ZMK 규격)
# =============================================================
# OLED 디스플레이 드라이버 표준 활성화
CONFIG_ZMK_DISPLAY=y

# OLED 화면에 실시간 WPM 타이핑 속도계 추가
CONFIG_ZMK_WPM=y
CONFIG_ZMK_WIDGET_WPM_STATUS=y

# 배터리 잔량을 정확한 숫자 퍼센트(%) 표기로 변경 (최신 플래그 교정)
CONFIG_ZMK_DISPLAY_BATTERY_PERCENTAGE=y

# =============================================================
# 2. 전력 관리 및 순정 자동 채널 전환(Auto Switch) 인프라
# =============================================================
# 배터리 보존을 위한 자동 절전 모드 (5분간 입력 없으면 초절전 딥 슬립)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# 유선(USB)과 무선(BLE) 채널 동시 활성화 (자동 스위칭 기반)
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# =============================================================
# 3. LED 백라이트 하드웨어 전력 원천 차단
# =============================================================
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
