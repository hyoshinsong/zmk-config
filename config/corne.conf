# -------------------------------------------------------------
# ZMK 핵심 시스템 및 커스텀 디스플레이 활성화
# -------------------------------------------------------------
CONFIG_ZMK_DISPLAY=y

# [필수] 외부 zmk-nice-oled 모듈의 커스텀 상태 화면 엔진 가동
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_NICE_OLED_ON=y

# -------------------------------------------------------------
# 중앙 스크린 (주로 왼쪽 마스터 기판) 위젯 커스텀 설정
# -------------------------------------------------------------
# WPM(타이핑 속도) 디스플레이 스타일 선택
# 0 = 단순 숫자 표시 (Number)
# 1 = 속도계 그래픽 (Speedometer)
# 2 = 실시간 꺾은선 그래프 (Graph)
# 3 = 달리는 루나 강아지 애니메이션 (Luna the Dog)
# 4 = 드럼 치는 봉고캣 애니메이션 (Bongo Cat)
CONFIG_NICE_OLED_WPM_DISPLAY=4

# 시스템 정보 인디케이터 활성화 (y = 활성화 / n = 비활성화)
CONFIG_NICE_OLED_LOGO_DISPLAY=y       # 최상단 ZMK 순정 로고 출력
CONFIG_NICE_OLED_MOD_DISPLAY=y        # 실시간 모디파이어 키(Ctrl, Shift, Alt, GUI) 눌림 상태 표시
CONFIG_NICE_OLED_HID_DISPLAY=y        # CapsLock 등 시스템 HID 상태 인디케이터 표시

# -------------------------------------------------------------
# 주변부 스크린 (주로 오른쪽 슬레이브 기판) 애니메이션 설정
# -------------------------------------------------------------
# 우측 화면을 채울 세로형 메인 애니메이션 캐릭터 선택
# 0 = 입체 보석 가동 애니메이션 (Gem)
# 1 = 식빵 굽는 고양이 애니메이션 (Cat)
# 2 = 움직이는 머리 형상 (Head)
# 3 = 포켓몬 애니메이션 (Pokemon)
# 4 = 우주를 유영하는 우주비행사 애니메이션 (Spaceman)
CONFIG_NICE_OLED_ANIMATION_PERIPHERAL=4

# 스마트 배터리 애니메이션 및 아트 설정
CONFIG_NICE_OLED_BATTERY_ANIMATION=y   # 잔량에 따라 실시간으로 출렁이는 배터리 이펙트
CONFIG_NICE_OLED_SLEEP_ART=y          # 키보드가 슬립/유휴 상태로 가기 전 전용 슬립 아트 출력

# -------------------------------------------------------------
# 시스템 전력 및 ZMK Studio 최적화
# -------------------------------------------------------------
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
