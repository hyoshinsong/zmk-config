# OLED 디스플레이 기본 활성화
CONFIG_ZMK_DISPLAY=y

# [핵심] 외부 nice_oled 세로형 사이버네틱 그래픽 모듈 가동
CONFIG_NICE_OLED_ON=y

# 딥 슬립(Deep Sleep) 모드 활성화 (5분간 입력 없으면 초절전 모드 진입)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# ZMK Studio (웹 GUI 실시간 편집기) 엔진 활성화
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# LED 백라이트 (RGB Underglow) 하드웨어 기능 전력 원천 차단
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
