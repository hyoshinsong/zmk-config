# OLED 디스플레이 순정 기본 활성화
CONFIG_ZMK_DISPLAY=y

# 배터리 관리를 위한 자동 절전 모드 (5분간 입력 없으면 초절전 딥 슬립)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# LED 백라이트 (RGB Underglow) 하드웨어 회로 전력 완천 차단 및 삭제
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# -------------------------------------------------------------
# USB 유선 우선순위 및 자동 채널 전환(Auto Switch) 설정
# -------------------------------------------------------------
# USB 케이블이 감지되면 블루투스보다 유선 데이터 통신을 최우선으로 강제 자동 선택
CONFIG_ZMK_USB_BOOT=y

# 물리적 연결 상태(USB 플러그 인/아웃)에 따라 엔드포인트를 실시간으로 자동 리디렉션
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n
CONFIG_ZMK_SPLIT_BLE_ROLE_CENTRAL=y
