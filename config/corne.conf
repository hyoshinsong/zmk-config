# -------------------------------------------------------------
# ZMK 시스템 및 디스플레이 최적화 설정 (종결판)
# -------------------------------------------------------------
# OLED 디스플레이 활성화
CONFIG_ZMK_DISPLAY=y

# OLED 화면을 90도 회전하여 수직 사이버네틱 UI 적용
CONFIG_ZMK_DISPLAY_WORK_QUEUE_SYSTEM=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILTIN=y

# 딥 슬립(Deep Sleep) 모드 활성화 (5분간 입력 없으면 초절전 모드 진입)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# -------------------------------------------------------------
# ZMK Studio (웹 GUI 실시간 편집기) 활성화
# -------------------------------------------------------------
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# -------------------------------------------------------------
# LED 백라이트 (RGB Underglow) 기능 영구 완전 차단
# -------------------------------------------------------------
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
