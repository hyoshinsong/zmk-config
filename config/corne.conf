# 1. ZMK 핵심 디스플레이 프레임워크 활성화
CONFIG_ZMK_DISPLAY=y

# 2. 구형/표준 Corne PCB를 위한 OLED 드라이버 전용 활성화 명세 (추가됨)
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_LV_FONT_DEFAULT_SMALL_MONO=y

# 3. Per-Key RGB 백라이트 하드웨어 모듈 활성화
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# 4. 배터리 절약을 위한 자동 취침 모드 (5분간 입력 없으면 슬립)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# 5. 부팅 시 RGB 백라이트의 기본 상태를 '꺼짐'으로 고정
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
