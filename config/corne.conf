# =============================================================
# 1. 디스플레이 순정 기본 활성화 및 확장 정보 표기 세팅
# =============================================================
# OLED 디스플레이 드라이버 표준 활성화
CONFIG_ZMK_DISPLAY=y

# OLED 화면에 실시간 WPM(Words Per Minute) 타이핑 속도계 표기
CONFIG_ZMK_WPM=y
CONFIG_ZMK_WIDGET_WPM_STATUS=y

# 4칸짜리 배터리 아이콘 그림을 정확한 숫자 퍼센트(%) 표기로 변경
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y

# =============================================================
# 2. 전력 관리 및 순정 자동 채널 전환(Auto Switch) 인프라
# =============================================================
# 배터리 보존을 위한 자동 절전 모드 (5분간 입력 없으면 초절전 딥 슬립)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# [공식 핵심 가이드] 유선(USB)과 무선(BLE) 서포트를 동시에 완전히 켬
# 이 두 라인이 깨끗하게 켜져 있어야 엔진이 플러그 인/아웃 신호를 감지해 자동으로 스위칭합니다.
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# =============================================================
# 3. LED 백라이트 하드웨어 전력 원천 차단 (배터리 극대화)
# =============================================================
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_WS2812_STRIP=n
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
