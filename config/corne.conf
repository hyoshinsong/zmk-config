# -------------------------------------------------------------
# ZMK 핵심 시스템 및 전력 관리 최적화 설정 (종결판)
# -------------------------------------------------------------

# OLED 디스플레이 활성화
CONFIG_ZMK_DISPLAY=y

# 딥 슬립(Deep Sleep) 모드 활성화 (5분간 입력 없으면 초절전 모드 진입)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# -------------------------------------------------------------
# ZMK Studio (웹 GUI 편집기) 활성화 설정
# -------------------------------------------------------------
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# -------------------------------------------------------------
# LED 백라이트 (RGB Underglow) 기능 완전 차단 및 삭제
# -------------------------------------------------------------
CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
